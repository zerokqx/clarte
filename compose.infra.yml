version: '3.8'

services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: clarte-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    restart: always

networks:
  default:
    name: clarte-network
