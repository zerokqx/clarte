services:
  minio:
    image: minio/minio
    # profiles:
    #   - minio
    ports:
      - '${MINIO_PORT:-6003}:9000'
      - '${MINIO_CONSOLE_PORT:-6004}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
  postgres:
    profiles:
      - db
    image: postgres:16-alpine
    container_name: clarte-notes-service-postgres
    ports:
      - '${POSTGRES_PORT}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
volumes:
  postgres_data:
  minio_data:
networks:
  default:
    external: true
    name: clarte-network
