services:
  mongodb:
    profiles:
      - db
    image: mongo:latest
    container_name: clarte-notes-service-mongodb
    ports:
      - '${MONGO_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_ROOT_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    restart: always
volumes:
  mongo_data:
networks:
  default:
    external: true
    name: clarte-network
