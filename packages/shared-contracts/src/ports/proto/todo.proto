syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

package todo;
service TodoService {
  rpc CreateTodo(CreateTodoRequest) returns (CreateTodoResponse);
  rpc UpdateTodo(UpdateTodoRequest) returns (google.protobuf.Empty);
  rpc GetUserTodos(GetUserTodosRequest) returns (GetUserTodsResponse);
}

message TodoResponse {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  bool is_completed = 5;
  string due_date = 6;
  string created_at = 7;
  string updated_at = 8;
}

message CreateTodoRequest {
  string title = 1;
  string description = 2;
  string dueDate = 3;
  string userId = 4;
}

message CreateTodoResponse {
  string id = 1;
}

message UpdateTodoRequest {
  string id = 1;
  string user_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional string due_date = 5;
  optional bool is_completed = 6;
}

message GetUserTodosRequest {
  string id = 1;
  string userId = 2;
}

message GetUserTodsResponse {
  repeated TodoResponse todos = 1;
}
