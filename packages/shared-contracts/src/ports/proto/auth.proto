syntax = "proto3";
import "google/protobuf/empty.proto";
package auth;

service AuthService {
  rpc ValidateUser(ValidateUserRequest) returns (ValidateUserResponse);
  rpc LoginPassword(LoginPasswordRequest) returns (LoginPasswordResponse);
  rpc RegisterPassword(RegisterRequest) returns (google.protobuf.Empty);
  rpc GetPublicJwtKey(google.protobuf.Empty) returns (GetPublicJwtKeyResponse);
  rpc RefreshTokens(RefreshTokensRequest) returns (RefreshTokensResponse);
};

message GetPublicJwtKeyResponse {
  string key = 1;
}

message LoginPasswordRequest {
  string login = 1;
  string password = 2;
}

message LoginPasswordResponse {
  bool success = 1;
  string refreshToken = 2;
  string accessToken = 3;
  string userId = 4;
}

message ValidateUserRequest {
  string login = 1;
  string password = 2;
}

message ValidateUserResponse {
  string id = 1;
  string login = 2;
}


message RegisterRequest {
  string login = 1;
  string password = 2;
}


message RefreshTokensRequest {
  string userId = 1;
  string refreshToken = 3;
}

message RefreshTokensResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

