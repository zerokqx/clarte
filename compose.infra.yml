services:
  pgadmin:
    profiles:
      - pgadmin
    image: dpage/pgadmin4
    container_name: clarte-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    restart: always
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: clarte-rmq
    ports:
      - "${RMQ_PORT:-7001}:5672"
      - "${RMQ_DASHBOARD_PORT:-7002}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RMQ_DEFAULT_PASS:-guest}
    restart: always
  redis:
    image: redis:7-alpine
    container_name: clarte-redis
    ports:
      - "${REDIS_PORT:-7000}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
  minio:
    image: minio/minio
    container_name: clarte-minio
    ports:
      - '${MINIO_PORT:-6003}:9000'
      - '${MINIO_CONSOLE_PORT:-6004}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    restart: always
volumes:
  redis_data:
  minio_data:
networks:
  default:
    name: clarte-network
